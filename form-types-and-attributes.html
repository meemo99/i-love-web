<!DOCTYPE html>
<html lang="nl">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://khouam.github.io/look-and-feel-styleguide/styleguide-design-for-recognition.css">

</head>

<section class="form1">
<h2>Formulier elementen</h2>
      <p>Bij het onderdeel formulier elementen worden input, radio, checkbox en buttons gedemonstreerd.</p>
      <form action="">

        <p>
          <label class="text-label">
            Text: 
            <input type="text" required class="">
          </label>
        </p>

        <label for="email">
          <input type="email" required id="email" placeholder="vul hier je email adres in">
        </label>
        
        <fieldset>
          <legend class="form-legend">Checkbox</legend>

          <label class="checkbox-label">
            <input type="checkbox" name="checkbox-1" checked class="checkbox-input">
            Checkbox 1
          </label>

          <label class="checkbox-label">
            <input type="checkbox" name="checkbox-2" class="checkbox-input">
            Checkbox 2
          </label>

          <label class="checkbox-label">
            <input type="checkbox" name="checkbox-3" class="checkbox-input">
            Checkbox 3
          </label>
        </fieldset>

        <p>
          <input type="submit" value="Submit button" class="btn btn-secondary">
        </p>

        <p>
          <button type="button" class="btn btn-primary">Button</button>
        </p>
      </form>

      </section>
