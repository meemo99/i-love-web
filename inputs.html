<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Digital Garden</title>
        <link rel="stylesheet" href="https://khouam.github.io/look-and-feel-styleguide/styleguide-design-for-recognition.css">
        <link rel="stylesheet" href="Styles/inputs.css">
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Aboreto&display=swap');
        </style>
</head>
<body>
        <input
        type="color"
        id="foreground"
        name="foreground"
        value="#C16E77" />
        <label for="foreground">Foreground colour</label>

        <input
        type="color"
        id="background"
        name="background"
        value="#BECAC3" />
        <label for="background">Background colour</label>




        <br>
        <br>
         <section id="formulieren">

      <h2>Formulier elementen</h2>
      <p>Bij het onderdeel formulier elementen worden input, radio, checkbox en buttons gedemonstreerd.</p>
      <form action="">

        <p>
          <label class="text-label">
            Op de hoogte blijven van de casestudy?
            Meld je aan!
            <input type="email" required class="">
          </label>
        </p>
        <p>
          <input type="submit" value="Verzend" class="btn btn-secondary">
        </p>

        <label for="email">

          Heb je feedback? Laat het ons weten!
          <input type="email" required id="email" placeholder="Schrijf hier je feedback">
        </label>
        <p>
          <button type="button" class="btn btn-primary">Verzend</button>
        </p>
      </form>
    </section>



</body>
